name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y python3-pip openjdk-17-jdk git zip unzip
        pip3 install buildozer cython
    
    - name: Remove old spec and configure
      run: |
        rm -f buildozer.spec
        buildozer init
        sed -i 's|# android.accept_sdk_license = False|android.accept_sdk_license = True|' buildozer.spec
    
    - name: Build APK
      run: buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: kyza-tapcat
        path: bin/*.apk
